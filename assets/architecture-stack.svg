<svg width="1200" height="920" viewBox="0 0 1200 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="164" y1="80" x2="982" y2="802" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F8F7"/>
      <stop offset="1" stop-color="#E8EFEC"/>
    </linearGradient>
    <linearGradient id="layer1" x1="268" y1="170" x2="900" y2="290" gradientUnits="userSpaceOnUse">
      <stop stop-color="#21464A"/>
      <stop offset="1" stop-color="#162C31"/>
    </linearGradient>
    <linearGradient id="layer2" x1="268" y1="282" x2="900" y2="402" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F8F68"/>
      <stop offset="1" stop-color="#0B704F"/>
    </linearGradient>
    <linearGradient id="layer3" x1="268" y1="394" x2="900" y2="514" gradientUnits="userSpaceOnUse">
      <stop stop-color="#33A77D"/>
      <stop offset="1" stop-color="#1E8764"/>
    </linearGradient>
    <linearGradient id="layer4" x1="268" y1="506" x2="900" y2="626" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C8DDD6"/>
      <stop offset="1" stop-color="#AFC8C0"/>
    </linearGradient>
    <linearGradient id="layer5" x1="268" y1="618" x2="900" y2="738" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0EBE7"/>
      <stop offset="1" stop-color="#CDDCD6"/>
    </linearGradient>
    <linearGradient id="layer6" x1="268" y1="730" x2="900" y2="850" gradientUnits="userSpaceOnUse">
