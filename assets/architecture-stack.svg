<svg width="1200" height="880" viewBox="0 0 1200 880" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="152" y1="72" x2="1004" y2="786" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F8F7"/>
      <stop offset="1" stop-color="#E8EFEC"/>
    </linearGradient>
    <linearGradient id="layer1" x1="176" y1="180" x2="1024" y2="268" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20454A"/>
      <stop offset="1" stop-color="#13282D"/>
    </linearGradient>
    <linearGradient id="layer2" x1="176" y1="286" x2="1024" y2="374" gradientUnits="userSpaceOnUse">
      <stop stop-color="#129362"/>
      <stop offset="1" stop-color="#0B714F"/>
    </linearGradient>
    <linearGradient id="layer3" x1="176" y1="392" x2="1024" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34A97E"/>
      <stop offset="1" stop-color="#1F8764"/>
    </linearGradient>
    <linearGradient id="layer4" x1="176" y1="498" x2="1024" y2="586" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D5E6E0"/>
      <stop offset="1" stop-color="#BDD3CB"/>
    </linearGradient>
    <linearGradient id="layer5" x1="176" y1="604" x2="1024" y2="692" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E7EFEC"/>
      <stop offset="1" stop-color="#D6E2DD"/>
    </linearGradient>
    <linearGradient id="layer6" x1="176" y1="710" x2="1024" y2="798" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F9FBFA"/>
      <stop offset="1" stop-color="#EEF3F1"/>
    </linearGradient>
    <style>
      .title { fill: #223235; font-family: Arial, sans-serif; font-size: 54px; font-weight: 700; }
      .subtitle { fill: #70807C; font-family: Arial, sans-serif; font-size: 24px; letter-spacing: 1.2px; }
      .layer-left-dark { fill: white; font-family: Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .layer-right-dark { fill: #D8ECE6; font-family: Arial, sans-serif; font-size: 20px; }
      .layer-left-light { fill: #223235; font-family: Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .layer-right-light { fill: #526763; font-family: Arial, sans-serif; font-size: 20px; }
    </style>
  </defs>

  <rect width="1200" height="880" rx="32" fill="url(#bg)"/>
  <text x="144" y="116" class="title">RoboClaw Architecture</text>
  <text x="144" y="156" class="subtitle">从控制平面到仿真学习的六层能力栈</text>

  <path d="M618 174V794" stroke="#7BC8A3" stroke-width="4" stroke-dasharray="10 14"/>

  <rect x="160" y="188" width="880" height="82" rx="24" fill="url(#layer1)"/>
  <text x="196" y="240" class="layer-left-dark">01 统一控制平面</text>
  <text x="642" y="240" class="layer-right-dark">Gateway / 注册 / 调度 / 事件 / 日志</text>

  <rect x="190" y="294" width="850" height="82" rx="24" fill="url(#layer2)"/>
  <text x="226" y="346" class="layer-left-dark">02 本体与传感器抽象层</text>
  <text x="642" y="346" class="layer-right-dark">Body / Sensor / Action / Safety Boundary</text>

  <rect x="220" y="400" width="820" height="82" rx="24" fill="url(#layer3)"/>
  <text x="256" y="452" class="layer-left-dark">03 本体认知与环境建联层</text>
  <text x="680" y="452" class="layer-right-dark">认识本体 / 理解环境 / 建立空间关系</text>

  <rect x="250" y="506" width="790" height="82" rx="24" fill="url(#layer4)"/>
  <text x="286" y="558" class="layer-left-light">04 任务与技能层</text>
  <text x="642" y="558" class="layer-right-light">Observe / Move / Pick / Place / Inspect</text>

  <rect x="280" y="612" width="760" height="82" rx="24" fill="url(#layer5)" stroke="#C8D8D2" stroke-width="2"/>
  <text x="316" y="664" class="layer-left-light">05 执行与安全层</text>
  <text x="642" y="664" class="layer-right-light">监督 / 急停 / 接管 / 重置 / 回放</text>

  <rect x="310" y="718" width="730" height="82" rx="24" fill="url(#layer6)" stroke="#D1DED9" stroke-width="2"/>
  <text x="346" y="770" class="layer-left-light">06 仿真与学习层</text>
  <text x="642" y="770" class="layer-right-light">Sim / Real 复用 / 训练 / 评估 / 复现</text>
</svg>
