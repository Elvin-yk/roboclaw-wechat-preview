  <rect width="1200" height="920" rx="32" fill="url(#bg)"/>
  <text x="146" y="120" fill="#243234" font-family="Arial, sans-serif" font-size="54" font-weight="700">RoboClaw Architecture</text>
  <text x="148" y="160" fill="#70807C" font-family="Arial, sans-serif" font-size="24" letter-spacing="1.2">从控制平面到仿真学习的六层能力栈</text>
  <rect x="192" y="196" width="816" height="92" rx="24" fill="url(#layer1)"/>
  <text x="232" y="250" fill="white" font-family="Arial, sans-serif" font-size="30" font-weight="700">01 统一控制平面</text>
  <text x="616" y="250" fill="#D9ECE7" font-family="Arial, sans-serif" font-size="22">Gateway / 注册 / 调度 / 事件 / 日志</text>
  <rect x="224" y="308" width="784" height="92" rx="24" fill="url(#layer2)"/>
  <text x="264" y="362" fill="white" font-family="Arial, sans-serif" font-size="30" font-weight="700">02 本体与传感器抽象层</text>
  <text x="654" y="362" fill="#D7F3E9" font-family="Arial, sans-serif" font-size="22">Body / Sensor / Action / Safety Boundary</text>
  <rect x="256" y="420" width="752" height="92" rx="24" fill="url(#layer3)"/>
  <text x="296" y="474" fill="white" font-family="Arial, sans-serif" font-size="30" font-weight="700">03 熟悉与 Grounding 层</text>
  <text x="648" y="474" fill="#E4FFF3" font-family="Arial, sans-serif" font-size="22">认识本体 / 理解环境 / 建立空间关系</text>
  <rect x="288" y="532" width="720" height="92" rx="24" fill="url(#layer4)"/>
  <text x="328" y="586" fill="#223235" font-family="Arial, sans-serif" font-size="30" font-weight="700">04 任务与技能层</text>
  <text x="626" y="586" fill="#3D5651" font-family="Arial, sans-serif" font-size="22">Observe / Move / Pick / Place / Inspect</text>
  <rect x="320" y="644" width="688" height="92" rx="24" fill="url(#layer5)" stroke="#C6D7D0" stroke-width="2"/>
  <text x="360" y="698" fill="#223235" font-family="Arial, sans-serif" font-size="30" font-weight="700">05 执行与安全层</text>
  <text x="648" y="698" fill="#586C68" font-family="Arial, sans-serif" font-size="22">监督 / 急停 / 接管 / 重置 / 回放</text>
  <rect x="352" y="756" width="656" height="92" rx="24" fill="url(#layer6)" stroke="#D3E0DB" stroke-width="2"/>
  <text x="392" y="810" fill="#223235" font-family="Arial, sans-serif" font-size="30" font-weight="700">06 仿真与学习层</text>
  <text x="646" y="810" fill="#617470" font-family="Arial, sans-serif" font-size="22">Sim / Real 复用 / 训练 / 评估 / 复现</text>
  <path d="M606 178V836" stroke="#7BC8A3" stroke-width="4" stroke-dasharray="10 14"/>
