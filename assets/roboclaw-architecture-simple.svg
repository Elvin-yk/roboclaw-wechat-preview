<svg width="1400" height="1180" viewBox="0 0 1400 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="140" y1="80" x2="1260" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F8FC"/>
      <stop offset="1" stop-color="#EAF2F8"/>
    </linearGradient>
    <linearGradient id="assistant" x1="160" y1="150" x2="1240" y2="290" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D6CDF"/>
      <stop offset="1" stop-color="#4E8CFF"/>
    </linearGradient>
    <linearGradient id="embodiment" x1="160" y1="335" x2="1240" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F8B8D"/>
      <stop offset="1" stop-color="#1AA3A6"/>
    </linearGradient>
    <linearGradient id="execution" x1="160" y1="770" x2="1240" y2="880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2F4F8F"/>
      <stop offset="1" stop-color="#4868B5"/>
    </linearGradient>
    <linearGradient id="carrier" x1="160" y1="935" x2="1240" y2="1090" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5B6574"/>
      <stop offset="1" stop-color="#7A8798"/>
    </linearGradient>
    <filter id="shadow" x="128" y="118" width="1144" height="1004" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#16324F" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1400" height="1180" rx="36" fill="url(#bg)"/>

  <text x="700" y="82" text-anchor="middle" fill="#10233C" font-size="56" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">
    RoboClaw 架构总览
  </text>
  <text x="700" y="124" text-anchor="middle" fill="#48627D" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">
    以助手层组织交互，以具身层完成理解，以执行层承接控制，以载体层连接仿真与真机
  </text>

  <g filter="url(#shadow)">
    <rect x="160" y="150" width="1080" height="138" rx="28" fill="url(#assistant)"/>
    <rect x="160" y="335" width="1080" height="385" rx="28" fill="url(#embodiment)"/>
    <rect x="160" y="770" width="1080" height="112" rx="28" fill="url(#execution)"/>
    <rect x="160" y="935" width="1080" height="145" rx="28" fill="url(#carrier)"/>
  </g>

  <text x="230" y="198" fill="white" font-size="34" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">
    1. 助手层
  </text>
  <text x="230" y="242" fill="#EAF3FF" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">
    负责用户、会话、智能体编排、工具路由和远程接入
  </text>

  <text x="230" y="385" fill="white" font-size="34" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">
    2. 具身层
  </text>
  <text x="230" y="428" fill="#E6FFFE" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">
    RoboClaw 最核心的一层，重点不是“接上机器人”，而是让系统真正理解这个身体
  </text>

  <g>
    <rect x="220" y="470" width="455" height="82" rx="22" fill="#DDF8F8" fill-opacity="0.96"/>
    <text x="252" y="505" fill="#0D3B3C" font-size="26" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">本体建模</text>
    <text x="252" y="538" fill="#275355" font-size="18" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">明确关节、末端执行器、传感器和约束</text>

    <rect x="725" y="470" width="455" height="82" rx="22" fill="#DDF8F8" fill-opacity="0.96"/>
    <text x="757" y="505" fill="#0D3B3C" font-size="26" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">空间建联</text>
    <text x="757" y="538" fill="#275355" font-size="18" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">组织坐标系、运动学、工作空间与安全边界</text>

    <rect x="220" y="575" width="455" height="82" rx="22" fill="#DDF8F8" fill-opacity="0.96"/>
    <text x="252" y="610" fill="#0D3B3C" font-size="26" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">能力抽象</text>
    <text x="252" y="643" fill="#275355" font-size="18" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">把底层硬件能力转成语义动作和能力图谱</text>

    <rect x="725" y="575" width="455" height="82" rx="22" fill="#DDF8F8" fill-opacity="0.96"/>
    <text x="757" y="610" fill="#0D3B3C" font-size="26" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">熟悉校准</text>
    <text x="757" y="643" fill="#275355" font-size="18" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">试探、校验、对齐之后逐步形成稳定认知</text>

    <rect x="220" y="680" width="960" height="82" rx="22" fill="#DDF8F8" fill-opacity="0.96"/>
    <text x="252" y="715" fill="#0D3B3C" font-size="26" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">训练辅助</text>
    <text x="252" y="748" fill="#275355" font-size="18" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">帮助组织本体训练、判断急停时机、恢复本体和环境，并决定下一步如何继续</text>
  </g>

  <text x="230" y="820" fill="white" font-size="34" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">
    3. 执行层
  </text>
  <text x="230" y="860" fill="#E8EEFF" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">
    以 ROS2 作为执行中间层，连接控制器、消息通道、服务调用、动作执行，以及安全监督和状态回传
  </text>

  <text x="230" y="985" fill="white" font-size="34" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">
    4. 载体层
  </text>
  <text x="230" y="1028" fill="#F1F5FA" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">
    连接仿真环境与真实机器人，承接部署、验证和回传
  </text>

  <rect x="862" y="977" width="136" height="48" rx="16" fill="#EFF4FA"/>
  <text x="930" y="1008" text-anchor="middle" fill="#455264" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">Simulation</text>
  <rect x="1018" y="977" width="162" height="48" rx="16" fill="#EFF4FA"/>
  <text x="1099" y="1008" text-anchor="middle" fill="#455264" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">Real Robot</text>
</svg>
