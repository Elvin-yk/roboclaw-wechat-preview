<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="136" y1="88" x2="1036" y2="656" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F9F7"/>
      <stop offset="1" stop-color="#E7EFEC"/>
    </linearGradient>
    <linearGradient id="sim" x1="150" y1="210" x2="530" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#193338"/>
      <stop offset="1" stop-color="#102226"/>
    </linearGradient>
    <linearGradient id="real" x1="670" y1="210" x2="1050" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#35C287"/>
      <stop offset="1" stop-color="#169C65"/>
    </linearGradient>
    <style>
      .title { fill: #223235; font-family: Arial, sans-serif; font-size: 54px; font-weight: 700; }
      .subtitle { fill: #70807C; font-family: Arial, sans-serif; font-size: 24px; letter-spacing: 1.2px; }
      .panel-kicker { fill: rgba(255,255,255,0.88); font-family: Arial, sans-serif; font-size: 24px; letter-spacing: 2px; }
      .panel-item { fill: white; font-family: Arial, sans-serif; font-size: 40px; font-weight: 700; }
      .shared-kicker { fill: #334447; font-family: Arial, sans-serif; font-size: 20px; letter-spacing: 1.5px; }
      .shared-item { fill: #223235; font-family: Arial, sans-serif; font-size: 34px; font-weight: 700; }
      .loop-top { fill: #219265; font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; }
      .loop-bottom { fill: #667A75; font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="32" fill="url(#bg)"/>
  <text x="128" y="118" class="title">Simulation ↔ Real Loop</text>
  <text x="128" y="158" class="subtitle">同一套任务与技能，在仿真和现实之间闭环复用</text>

  <rect x="150" y="208" width="380" height="330" rx="30" fill="url(#sim)"/>
  <text x="194" y="272" class="panel-kicker">SIMULATION</text>
  <text x="194" y="326" class="panel-item">策略预热</text>
  <text x="194" y="382" class="panel-item">课程生成</text>
  <text x="194" y="438" class="panel-item">批量训练</text>

  <rect x="670" y="208" width="380" height="330" rx="30" fill="url(#real)"/>
  <text x="714" y="272" class="panel-kicker">REAL WORLD</text>
  <text x="714" y="326" class="panel-item">真实执行</text>
  <text x="714" y="382" class="panel-item">失败回收</text>
  <text x="714" y="438" class="panel-item">评估复盘</text>

  <circle cx="600" cy="372" r="98" fill="#FBFFFD" stroke="#D5E2DD" stroke-width="2"/>
  <text x="600" y="352" text-anchor="middle" class="shared-kicker">SHARED</text>
  <text x="600" y="392" text-anchor="middle" class="shared-item">Task</text>
  <text x="600" y="430" text-anchor="middle" class="shared-item">Skill</text>

  <path d="M530 372H480" stroke="#223235" stroke-width="12" stroke-linecap="round"/>
  <path d="M670 372H720" stroke="#223235" stroke-width="12" stroke-linecap="round"/>
  <path d="M490 362L452 372L490 382" stroke="#223235" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M710 362L748 372L710 382" stroke="#223235" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M356 592C446 652 758 652 848 592" stroke="#74C79F" stroke-width="8" stroke-linecap="round" stroke-dasharray="14 18"/>
  <path d="M848 588H892L872 622" stroke="#74C79F" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M848 636C758 692 446 692 356 636" stroke="#9CB0AA" stroke-width="8" stroke-linecap="round" stroke-dasharray="14 18"/>
  <path d="M356 632H312L332 598" stroke="#9CB0AA" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="430" y="666" class="loop-top">Training → Deployment</text>
  <text x="404" y="712" class="loop-bottom">Execution → Data → Evaluation</text>
</svg>
