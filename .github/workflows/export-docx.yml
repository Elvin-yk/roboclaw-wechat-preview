name: Export homepage to DOCX

on:
  push:
    branches:
      - main
    paths:
      - article.md
      - assets/**
      - .github/workflows/export-docx.yml

permissions:
  contents: write

jobs:
  export-docx:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Generate DOCX
        run: |
          pandoc article.md \
            --from markdown \
            --to docx \
            --standalone \
            --output roboclaw-homepage-export.docx

      - name: Commit DOCX if changed
        run: |
          if [ -z "$(git status --porcelain -- roboclaw-homepage-export.docx)" ]; then
            echo "No DOCX changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add roboclaw-homepage-export.docx
          git commit -m "Generate homepage DOCX"
          git push
